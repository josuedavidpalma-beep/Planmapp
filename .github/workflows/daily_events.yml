name: daily-scrape-offers
on:
  schedule:
    - cron: "0 10 * * *" # Se ejecuta a las 5:00 AM hora Colombia
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Scraper
        run: python tu_script_de_busqueda.py # CAMBIA ESTO por el nombre de tu archivo Python

      - name: Save Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Nuevas ofertas y eventos detectados" || exit 0
          git push
