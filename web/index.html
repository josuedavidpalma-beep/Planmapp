<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- PREVENIR CACHE AUTOMATICO DE PWA -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="Planmapp: La app definitiva para organizar planes épicos sin dramas. Divide gastos, confirma asistencia y lánzate a la aventura con tus amigos.">
  <meta name="keywords" content="planes, amigos, gastos, viajes, grupal, social, parches, eventos, presupuesto">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:title" content="Planmapp | Planes Épicos Sin Dramas" />
  <meta property="og:description"
    content="Organiza tu vida social en un toque. Divide cuentas, vota lugares y confirma asistencia sin el caos de los grupos de chat." />
  <meta property="og:image" content="https://raw.githubusercontent.com/josuedavidpalma-beep/Planmapp/main/web/icons/Icon-512.png" />
  <meta property="og:url" content="https://josuedavidpalma-beep.github.io/Planmapp/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Planmapp" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Planmapp | Menos Drama, Más Planes">
  <meta name="twitter:description" content="La herramienta esencial para coordinar salidas con amigos sin perder el rastro de quién paga qué.">

  <!-- Apple iOS Web Clip -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planmapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme Color -->
  <meta name="theme-color" content="#050505">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Planmapp | Menos Drama, Más Planes</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #050505; /* AppTheme.darkBackground */
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: pulse 2.5s infinite ease-in-out;
    }
    .loader-logo {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin-bottom: 32px;
      box-shadow: 0 12px 36px rgba(99, 102, 241, 0.4);
    }
    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-left-color: #6366f1; /* AppTheme.primaryBrand */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.85; }
    }
  </style>
</head>

<body>
  <div class="loader-container" id="app-loader">
    <img src="icons/Icon-192.png" alt="Planmapp Logo" class="loader-logo">
    <div class="loader-spinner"></div>
  </div>

  <script>
    // PWA Install Prompt Interceptor
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      deferredPrompt = e;
    });

    window.promptPwaInstall = async function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('User accepted the A2HS prompt');
        } else {
          console.log('User dismissed the A2HS prompt');
        }
        deferredPrompt = null;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
