<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Planmapp</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect
      var l = window.location;
      var repoMatches = l.pathname.match(/^\/[^\/]+\//);
      var repo = repoMatches ? repoMatches[0] : '/';
      var route = l.pathname.substring(repo.length);
      
      var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                   repo + '?nav=' + route.replace(/^\//, '') + l.search.replace(/^\?/, '&') + l.hash;
                   
      l.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
